<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-head">
      <h1>Todo</h1>
    </header>

    <form id="new-form" class="new-form" autocomplete="off">
      <input id="new-input" class="new-input" type="text" placeholder="What needs doing?" aria-label="New todo">
      <button type="submit" class="add-btn">Add</button>
    </form>

    <ul id="list" class="list" aria-live="polite"></ul>

    <footer class="app-foot">
      <span id="count" class="count">0 items left</span>
      <div class="filters" id="filters" role="group" aria-label="Filter todos">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>
    </footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
