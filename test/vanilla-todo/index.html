<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Todo</h1>

    <form id="add-form" class="add-form" autocomplete="off">
      <input id="add-input" class="add-input" type="text" placeholder="What needs doing?" aria-label="New task">
      <button type="submit" class="add-btn">Add</button>
    </form>

    <ul id="list" class="list" aria-live="polite"></ul>
    <p id="empty" class="empty" hidden>Nothing here yet — add your first task above.</p>

    <footer class="foot">
      <span id="count" class="count">0 items left</span>
      <div class="filters" role="group" aria-label="Filter tasks">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="done">Done</button>
      </div>
      <button id="clear-done" class="clear">Clear completed</button>
    </footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
